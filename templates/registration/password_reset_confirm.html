{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - PlantCare AI</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: url("{% static 'Background.jpg' %}") no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 1rem;
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        h2 {
            color: #22c55e;
            margin-bottom: 1rem;
        }
        .form-group {
            text-align: left;
            margin-bottom: 1rem;
        }
        label {
            font-size: 0.9rem;
            color: #111827;
            font-weight: 500;
        }
        input[type="password"] {
            width: 100%;
            padding: 0.7rem;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            font-size: 1rem;
        }
        button {
            background: linear-gradient(135deg, #22c55e, #059669);
            color: white;
            border: none;
            padding: 0.7rem;
            width: 100%;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        button:hover {
            box-shadow: 0 5px 10px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Set New Password</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Update Password</button>
        </form>
    </div>
</body>
</html>
