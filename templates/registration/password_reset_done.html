{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sent - PlantCare AI</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: url("{% static 'Background.jpg' %}") no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 1rem;
            padding: 2rem;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        h2 {
            color: #22c55e;
            margin-bottom: 1rem;
        }
        p {
            color: #6b7280;
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }
        a {
            color: #22c55e;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Email Sent!</h2>
        <p>If the email you entered is associated with an account, a password reset link has been sent.</p>
        <a href="{% url 'predictor:login' %}">Back to Login</a>
    </div>
</body>
</html>
