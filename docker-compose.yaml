services:
  redis:
    image: redis/redis-stack
    container_name: redis-server
    ports:
      - "6379:6379"
      - "8001:8001"
    networks:
      - pddNetwork

  worker:
    build: .
    container_name: celery-worker
    command: celery -A PlantDiseaseDetection worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - redis
    networks:
      - pddNetwork

  backend:
    build: .
    container_name: backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    networks:
      - pddNetwork

networks:
  pddNetwork:
    driver: bridge
